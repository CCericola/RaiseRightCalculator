name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish Blazor app
        run: dotnet publish RaiseRightCalculator.Web/RaiseRightCalculator.Web.csproj -c Release -o publish

      - name: Fix base href and add SPA fallback
        run: |
          # Rewrite base href for GitHub Pages subdirectory hosting
          sed -i 's|<base href="/" />|<base href="/RaiseRightCalculator/" />|g' publish/wwwroot/index.html
          # Copy index.html as 404.html for SPA routing fallback
          cp publish/wwwroot/index.html publish/wwwroot/404.html
          # Suppress Jekyll processing
          touch publish/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
