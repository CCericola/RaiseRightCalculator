name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish Blazor app
        run: dotnet publish RaiseRightCalculator.Web/RaiseRightCalculator.Web.csproj -c Release -o publish

      - name: Find wwwroot
        id: paths
        run: |
          INDEX=$(find publish -name "index.html" | head -1)
          WWWROOT=$(dirname "$INDEX")
          echo "index=$INDEX" >> $GITHUB_OUTPUT
          echo "wwwroot=$WWWROOT" >> $GITHUB_OUTPUT
          echo "Found: $INDEX"

      - name: Fix base href and add SPA fallback
        run: |
          sed -i 's|<base href="/" />|<base href="/RaiseRightCalculator/" />|g' "${{ steps.paths.outputs.index }}"
          cp "${{ steps.paths.outputs.index }}" "${{ steps.paths.outputs.wwwroot }}/404.html"
          touch "${{ steps.paths.outputs.wwwroot }}/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.paths.outputs.wwwroot }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
