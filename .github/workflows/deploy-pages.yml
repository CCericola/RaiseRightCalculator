name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish Blazor app
        run: dotnet publish RaiseRightCalculator.Web/RaiseRightCalculator.Web.csproj -c Release -o publish

      - name: List publish output
        run: find publish -type f | sort

      - name: Add SPA fallback and suppress Jekyll
        run: |
          WWWROOT=$(find publish -name "index.html" | head -1 | xargs dirname)
          cp "$WWWROOT/index.html" "$WWWROOT/404.html"
          touch "$WWWROOT/.nojekyll"
          echo "WWWROOT=$WWWROOT" >> $GITHUB_ENV

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.WWWROOT }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
